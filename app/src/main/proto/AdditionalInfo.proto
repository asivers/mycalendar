syntax = "proto3";

option java_package = "com.asivers.mycalendar.data.proto";

message AdditionalInfo {
  // workaround to distinguish first launch and user denial cases
  // sets "true" on first time when notification permission is granted
  bool wasNotificationPermissionRequestedBefore = 1;

  // the last app version code the user has seen
  // sets new value on first application run after installed updates
  int32 lastSeenVersion = 2;
}
